<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MrtkiBlock Reloaded</title>
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
<div class="content">
    <div class="header">
        <h1>MrtkiBlock Reloaded</h1>
        <div id="subtitle">Pro čtení Novinek bez zvýšeného tlaku...</div>
    </div>
    <div class="choices">
        <div>
            <input type="checkbox" id="temporaryOff">
            <label for="temporaryOff">Dočasně vypnout (vyžaduje refresh)</label>
        </div>
        <div>
            <input type="checkbox" id="webBanned">
            <label for="webBanned">Ignorovat na tomto webu</label>
        </div>
        <div>
            <input type="checkbox" id="hideOriginal">
            <label for="hideOriginal">Nezobrazovat původní text při najetí myší (život na obtížnost hard)</label>
        </div>
    </div>
</div>
</body>
</html>
